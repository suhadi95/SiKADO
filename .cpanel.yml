---
deployment:
  tasks:
    - export DEPLOYPATH=/home/suhadipc/public_html/web_sikado/
    - /bin/mkdir -p $DEPLOYPATH
    - /usr/bin/rsync -av --exclude='.git' --exclude='.env' --exclude='.env.*' --exclude='node_modules' --exclude='tests' --exclude='storage/app/google' --exclude='storage/logs/*' --exclude='storage/framework/cache/data/*' --exclude='storage/framework/sessions/*' --exclude='storage/framework/views/*' ./ $DEPLOYPATH/
    - /bin/mkdir -p $DEPLOYPATH/storage/framework/{cache,sessions,views} $DEPLOYPATH/storage/logs $DEPLOYPATH/storage/app/public $DEPLOYPATH/bootstrap/cache
    - cd $DEPLOYPATH && /usr/local/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force
    - cd $DEPLOYPATH && /usr/local/bin/php artisan storage:link
    - cd $DEPLOYPATH && /usr/local/bin/php artisan config:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan route:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan view:cache
    - /bin/chmod -R 775 $DEPLOYPATH/storage $DEPLOYPATH/bootstrap/cache
